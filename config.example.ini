[email]
# IMAP-Server deines E-Mail-Anbieters
# Outlook/Office365: outlook.office365.com
# Gmail:             imap.gmail.com
# GMX:               imap.gmx.net
imap_server = outlook.office365.com
imap_port = 993
# E-Mail-Adresse des überwachten Postfachs
email_address = deine@email.at
# Passwort (bei Office365 mit MFA: App-Passwort verwenden)
email_password = DEIN_PASSWORT_HIER
# Zu überwachender Ordner
mailbox = INBOX

[filter]
# Nur E-Mails von diesem Absender werden gedruckt
allowed_sender = disponent@lfv.stmk.at

[printer]
# Name des Druckers in CUPS (ermitteln mit: lpstat -p)
printer_name = drucker-ff
# Anzahl Kopien
copies = 1

[general]
# Prüfintervall in Sekunden
check_interval = 30
# Log-Datei
log_file = /var/log/feuerwehr-drucker.log
